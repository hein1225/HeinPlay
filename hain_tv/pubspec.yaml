name: hain_tv
description: "海因影视 TV 版"
publish_to: 'none'
version: 1.1.6+11

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.5.0
  shared_preferences: ^2.5.3
  cached_network_image: ^3.4.1
  video_player: ^2.11.1
  video_player_android: ^2.11.0
  path_provider: ^2.1.5
  path_provider_platform_interface: ^2.1.2
  shared_preferences_platform_interface: ^2.4.1
  permission_handler: ^12.0.3
  dio: ^5.4.0
  open_filex: ^4.4.0
  visibility_detector: ^0.4.0+2
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.1
  wakelock_plus: ^1.2.10
  screen_brightness: ^2.1.1
  volume_controller: ^3.3.2
  flutter_js: ^0.8.2
  window_manager: ^0.5.2
  fvp: ^0.37.3
  vlc_player:
    path: deps/vlc_player_windows

dependency_overrides:
  # permission_handler_windows 0.2.1 使用已废弃的 /await 与
  # <experimental/coroutine> 在新版 MSVC 中构建失败，使用本地修正副本。
  permission_handler_windows:
    path: deps/permission_handler_windows
  # video_player_android 插件内部自行创建 ExoPlayer，无法从 Dart 层注入 LoadControl。
  # 使用本地副本，在创建 ExoPlayer 时反射读取 HeinPlay 的分级缓冲配置。
  video_player_android:
    path: deps/video_player_android
  # audio_video_progress_bar 0.11.0 仍使用 Flutter 3.x 已移除的 textTheme.bodyText1，
  # 强制覆盖到 2.0.3 以兼容 Flutter 3.44.6 的新 TextTheme API。
  audio_video_progress_bar: ^2.0.3

dev_dependencies:
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  image_path: "../plan/ico.png"
  android:
    generate: true
    adaptive_icon_background: "#00000000"
    adaptive_icon_foreground: "../plan/mo_ico.png"
  windows:
    generate: true
    image_path: "../plan/mo_ico.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "../plan/ico.png"
  web:
    generate: true
    image_path: "../plan/ico.png"
    background_color: "#0A0A0F"
    theme_color: "#E50914"
