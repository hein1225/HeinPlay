name: hain_tv
description: "海因影视 TV 版"
publish_to: 'none'
version: 1.1.1+6

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.5.0
  shared_preferences: ^2.5.3
  cached_network_image: ^3.4.1
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  video_player: ^2.11.1
  video_player_android: ^2.11.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.3
  dio: ^5.4.0
  open_filex: ^4.4.0
  visibility_detector: ^0.4.0+2
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.1
  wakelock_plus: ^1.2.10
  screen_brightness: ^2.1.1
  volume_controller: ^3.3.2
  flutter_js: ^0.8.2

dev_dependencies:
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  image_path: "../plan/ico.png"
  android:
    generate: true
    adaptive_icon_background: "#0A0A0F"
    adaptive_icon_foreground: "../plan/ico.png"
  windows:
    generate: true
    image_path: "../plan/ico.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "../plan/ico.png"
  web:
    generate: true
    image_path: "../plan/ico.png"
    background_color: "#0A0A0F"
    theme_color: "#E50914"
